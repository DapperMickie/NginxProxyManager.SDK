name: Publish NuGet Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, e.g. 2.0.3. Leave empty to use the project file version."
        required: false
        type: string
      dry_run:
        description: "Build and pack, but do not publish to NuGet.org."
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for NuGet/login OIDC token issuance.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.version }}" ]; then
            dotnet pack --no-build --configuration Release --output ./artifacts -p:PackageVersion=${{ inputs.version }}
          else
            dotnet pack --no-build --configuration Release --output ./artifacts
          fi

      - name: List package artifacts
        run: ls -la ./artifacts/*.nupkg

      - name: NuGet login (OIDC → temp API key)
        if: ${{ !inputs.dry_run }}
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: NuGet push
        if: ${{ !inputs.dry_run }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
